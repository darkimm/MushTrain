services:
  - type: web
    name: mushtrain
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false   # You will paste this manually in Render dashboard
      - key: PORT
        value: 8000